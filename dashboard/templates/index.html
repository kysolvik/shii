<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NYC Social Heat Impact Index</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌡️</text></svg>">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <div id="title">NYC Social Heat Impact Index</div>
    <div id="subtitle">3-day rolling 311 &amp; EMS signal</div>
  </div>

  <!-- Date controls -->
  <div class="panel-section">
    <div class="section-label">DATE</div>
    <div id="date-nav">
      <button id="btn-prev" title="Previous day">&#8592;</button>
      <input type="date" id="date-picker" min="{{ date_min }}" max="{{ date_max }}">
      <button id="btn-next" title="Next day">&#8594;</button>
    </div>
    <div id="date-meta">
      <span id="tmax-badge"></span>
      <button id="btn-play" title="Animate forward">&#9654; Play</button>
    </div>
  </div>

  <!-- Categories -->
  <div class="panel-section">
    <div class="section-label">
      CATEGORIES
      <span class="section-actions">
        <button class="link-btn" id="btn-all">all</button>
        <button class="link-btn" id="btn-none">none</button>
      </span>
    </div>
    <div id="cat-list">
      {% for key, cat in categories.items() %}
      <label class="cat-row">
        <input type="checkbox" class="cat-cb" data-key="{{ key }}" {{ 'checked' if key != 'ventilation' else '' }}>
        <span class="cat-dot" style="background:{{ cat.color }}"></span>
        <span class="cat-name">{{ cat.label }}</span>
        <span class="cat-thresh">&gt;{{ cat.threshold }}/100k</span>
      </label>
      {% endfor %}
    </div>
  </div>

  <!-- Legend -->
  <div class="panel-section">
    <div class="section-label">SHII SCORE</div>
    <div id="legend"></div>
    <div class="legend-note">Score = # thresholds exceeded among selected categories</div>
  </div>

  <div id="sidebar-footer">
    Data: NYC Open Data · Meteostat<br>
    Rolling window: 3 days ending on selected date
  </div>
</div>

<!-- Tooltip -->
<div id="tooltip" class="hidden"></div>

<!-- Map -->
<div id="map"></div>

<!-- Timeline panel -->
<div id="timeline-panel" class="hidden">
  <div id="timeline-header">
    <span id="timeline-title"></span>
    <button id="timeline-close" title="Close">✕</button>
  </div>
  <div id="timeline-chart-wrap">
    <canvas id="timeline-chart"></canvas>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3/dist/chartjs-plugin-annotation.min.js"></script>
<script>
  const DATE_MIN = "{{ date_min }}";
  const DATE_MAX = "{{ date_max }}";
  const DATE_DEFAULT = "{{ date_default }}";
  const CAT_CONFIG = {{ categories | tojson }};
  const CAT_KEYS = Object.keys(CAT_CONFIG);
</script>
<script src="/static/js/map.js"></script>
</body>
</html>
